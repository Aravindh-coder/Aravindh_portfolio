<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aravindh A — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5d4;
    --pink: #ff2d78;
    --yellow: #ffe135;
    --purple: #a855f7;
    --orange: #ff6b35;
    --blue: #3b82f6;
    --bg: #080810;
    --card: #0f0f1a;
    --line: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:#fff; font-family:'DM Sans',sans-serif; overflow-x:hidden; cursor:none; }

  .cursor { width:12px;height:12px;background:var(--cyan);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;mix-blend-mode:difference; }
  .cursor-trail { width:36px;height:36px;border:1.5px solid var(--cyan);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;opacity:0.5; }

  body::before { content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:0.4; }

  /* ===== INTRO OVERLAY ===== */
  #intro-overlay {
    position:fixed; inset:0; z-index:1000;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition:opacity 0.8s ease, visibility 0.8s;
  }
  #intro-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }

  .intro-scene {
    display:flex; flex-direction:column; align-items:center; gap:0;
    position:relative;
  }

  /* Avatar container */
  .av-wrap {
    position:relative; width:220px; height:260px;
    animation:avEntrance 1s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes avEntrance {
    from { transform:translateY(60px) scale(0.7); opacity:0; }
    to   { transform:translateY(0) scale(1); opacity:1; }
  }

  .av-glow-ring {
    position:absolute; inset:-8px; border-radius:50% 50% 45% 45%;
    background:conic-gradient(var(--cyan),var(--purple),var(--pink),var(--yellow),var(--cyan));
    animation:spinRing 5s linear infinite;
    padding:4px;
    filter:blur(0px);
  }
  @keyframes spinRing { to { transform:rotate(360deg); } }

  .av-glow-inner {
    position:absolute; inset:0px; border-radius:50% 50% 44% 44%;
    background:var(--bg); overflow:hidden;
  }
  .av-img {
    width:100%; height:100%; object-fit:cover; object-position:top center;
    border-radius:50% 50% 44% 44%;
    /* talking mouth animation - subtle bob */
    transform-origin:bottom center;
  }
  .av-img.talking {
    animation:talkBob 0.18s ease-in-out infinite alternate;
  }
  @keyframes talkBob {
    from { transform:scaleY(1) translateY(0); }
    to   { transform:scaleY(1.012) translateY(-2px); }
  }

  /* Blink eyes effect using pseudo overlay */
  .av-blink {
    position:absolute; inset:0; border-radius:50% 50% 44% 44%;
    background:var(--bg); opacity:0; pointer-events:none;
    animation:blinkAnim 4s ease-in-out infinite;
  }
  @keyframes blinkAnim {
    0%,94%,100% { opacity:0; }
    96%,98%     { opacity:0.18; }
  }

  /* Floating sparkles around avatar */
  .sparkle {
    position:absolute; width:6px; height:6px; border-radius:50%;
    animation:sparklePop var(--sd,2s) ease-in-out infinite;
    animation-delay:var(--delay,0s);
  }
  @keyframes sparklePop {
    0%,100% { transform:scale(0) translate(0,0); opacity:0; }
    50% { transform:scale(1) translate(var(--tx,0),var(--ty,0)); opacity:1; }
  }

  /* Speech bubble */
  .speech-bubble {
    position:relative;
    background:linear-gradient(135deg,rgba(0,245,212,0.12),rgba(168,85,247,0.12));
    border:1px solid rgba(0,245,212,0.3);
    border-radius:20px 20px 20px 4px;
    padding:20px 26px;
    max-width:360px;
    margin-top:20px;
    backdrop-filter:blur(10px);
    animation:bubbleSlide 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
    min-height:80px;
  }
  .speech-bubble::before {
    content:''; position:absolute; top:-12px; left:30px;
    border:12px solid transparent;
    border-bottom-color:rgba(0,245,212,0.3);
    border-top:0;
    transform:rotate(180deg) translateY(12px);
  }
  @keyframes bubbleSlide {
    from { transform:translateY(20px) scale(0.9); opacity:0; }
    to   { transform:translateY(0) scale(1); opacity:1; }
  }

  #speech-text {
    font-family:'Syne',sans-serif; font-size:15px; font-weight:600;
    line-height:1.7; color:#fff; min-height:50px;
  }
  .cursor-blink {
    display:inline-block; width:2px; height:16px;
    background:var(--cyan); margin-left:2px; vertical-align:middle;
    animation:blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Name badge under bubble */
  .intro-name {
    margin-top:14px;
    font-family:'Syne',sans-serif; font-weight:800; font-size:28px;
    background:linear-gradient(135deg,#fff 30%,var(--cyan) 60%,var(--purple) 90%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    animation:heroFadeUp 0.8s ease 0.5s both;
    text-align:center;
  }
  @keyframes heroFadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* Enter button */
  #enter-btn {
    margin-top:24px;
    padding:14px 40px; border-radius:100px;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    color:#000; font-family:'Syne',sans-serif; font-weight:800; font-size:15px;
    border:none; cursor:pointer;
    box-shadow:0 0 30px rgba(0,245,212,0.3);
    transition:transform 0.2s, box-shadow 0.2s;
    opacity:0; pointer-events:none;
    animation:none;
  }
  #enter-btn.show {
    animation:btnPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    pointer-events:auto;
  }
  #enter-btn:hover { transform:scale(1.05); box-shadow:0 0 50px rgba(0,245,212,0.5); }
  @keyframes btnPop { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }

  /* Skip */
  #skip-btn {
    position:absolute; top:24px; right:24px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.4); font-size:12px; padding:8px 16px;
    border-radius:100px; cursor:pointer; transition:all 0.2s;
    font-family:'DM Sans',sans-serif;
  }
  #skip-btn:hover { color:#fff; background:rgba(255,255,255,0.1); }

  /* ===== MAIN PORTFOLIO (hidden until intro done) ===== */
  #main-portfolio { opacity:0; transition:opacity 0.8s ease; }
  #main-portfolio.visible { opacity:1; }

  /* Stars */
  .stars { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
  .star { position:absolute;width:2px;height:2px;background:rgba(255,255,255,0.6);border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;animation-delay:var(--delay,0s); }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.4)} }

  /* Nav dots */
  .nav-dots { position:fixed;right:24px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100; }
  .nav-dot { width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);cursor:pointer;transition:all 0.3s;border:none;padding:0; }
  .nav-dot.active { background:var(--cyan);box-shadow:0 0 10px var(--cyan);transform:scale(1.4); }

  /* HERO */
  #hero { min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:40px 20px; }
  .hero-bg { position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(0,245,212,0.08) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 40%,rgba(168,85,247,0.08) 0%,transparent 70%); }
  .orb { position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat 8s ease-in-out infinite;pointer-events:none; }
  .orb1 { width:300px;height:300px;background:rgba(0,245,212,0.12);top:-50px;left:-100px; }
  .orb2 { width:250px;height:250px;background:rgba(255,45,120,0.1);bottom:-80px;right:-80px;animation-delay:-3s; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-20px) scale(1.05)} }

  /* Hero avatar (small version) */
  .hero-avatar-ring {
    width:140px;height:140px;border-radius:50%;
    background:conic-gradient(var(--cyan),var(--purple),var(--pink),var(--yellow),var(--cyan));
    padding:3px; animation:spin 6s linear infinite; margin-bottom:28px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .hero-avatar-inner { width:100%;height:100%;border-radius:50%;background:var(--bg);overflow:hidden; }
  .hero-avatar-inner img { width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:50%; }

  .hero-name { font-family:'Syne',sans-serif;font-size:clamp(42px,8vw,90px);font-weight:800;line-height:1;letter-spacing:-2px;background:linear-gradient(135deg,#fff 30%,var(--cyan) 60%,var(--purple) 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:heroFadeUp 1s ease 0.2s both; }
  .hero-role { font-size:clamp(14px,2vw,18px);color:var(--cyan);letter-spacing:4px;text-transform:uppercase;margin-top:12px;animation:heroFadeUp 1s ease 0.4s both; }
  .hero-bio { max-width:540px;text-align:center;color:rgba(255,255,255,0.55);font-size:15px;line-height:1.8;margin-top:16px;animation:heroFadeUp 1s ease 0.6s both; }
  .hero-tags { display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:24px;animation:heroFadeUp 1s ease 0.8s both; }
  .hero-tag { padding:6px 16px;border-radius:100px;font-size:13px;border:1px solid;font-family:'Syne',sans-serif;font-weight:600; }
  .hero-tag:nth-child(1) { border-color:var(--cyan);color:var(--cyan); }
  .hero-tag:nth-child(2) { border-color:var(--pink);color:var(--pink); }
  .hero-tag:nth-child(3) { border-color:var(--yellow);color:var(--yellow); }
  .scroll-hint { position:absolute;bottom:30px;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:3px;text-transform:uppercase;animation:heroFadeUp 1s ease 1.2s both; }
  .scroll-line { width:1px;height:50px;background:linear-gradient(to bottom,var(--cyan),transparent);animation:scrollPulse 1.5s ease-in-out infinite; }
  @keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* Section common */
  section { padding:100px 20px;position:relative;z-index:2; }
  .section-label { font-family:'Syne',sans-serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:12px; }
  .section-label::after { content:'';flex:1;height:1px;background:linear-gradient(to right,var(--cyan),transparent); }
  .section-title { font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:800;line-height:1.1;margin-bottom:60px; }
  .container { max-width:900px;margin:0 auto; }

  /* Mindmap */
  .mindmap { position:relative;display:flex;flex-direction:column;align-items:center; }
  .mindmap-spine { position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--cyan) 10%,var(--purple) 50%,var(--pink) 90%,transparent);transform:translateX(-50%); }
  .mindmap-node { display:flex;align-items:center;width:100%;margin-bottom:60px;position:relative;opacity:0;transform:translateY(40px);transition:opacity 0.7s ease,transform 0.7s ease; }
  .mindmap-node.visible { opacity:1;transform:translateY(0); }
  .mindmap-node:nth-child(even) { flex-direction:row-reverse; }
  .node-connector { flex:0 0 80px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2; }
  .node-dot { width:18px;height:18px;border-radius:50%;background:var(--bg);border:3px solid var(--cyan);box-shadow:0 0 15px var(--cyan);flex-shrink:0; }
  .mindmap-node:nth-child(2) .node-dot { border-color:var(--pink);box-shadow:0 0 15px var(--pink); }
  .mindmap-node:nth-child(3) .node-dot { border-color:var(--yellow);box-shadow:0 0 15px var(--yellow); }
  .mindmap-node:nth-child(4) .node-dot { border-color:var(--purple);box-shadow:0 0 15px var(--purple); }
  .mindmap-node:nth-child(5) .node-dot { border-color:var(--orange);box-shadow:0 0 15px var(--orange); }
  .mindmap-node:nth-child(6) .node-dot { border-color:var(--blue);box-shadow:0 0 15px var(--blue); }
  .node-card { flex:1;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px 32px;position:relative;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s; }
  .node-card:hover { transform:translateY(-4px); }
  .mindmap-node:nth-child(1) .node-card:hover { border-color:var(--cyan);box-shadow:0 20px 60px rgba(0,245,212,0.1); }
  .mindmap-node:nth-child(2) .node-card:hover { border-color:var(--pink);box-shadow:0 20px 60px rgba(255,45,120,0.1); }
  .mindmap-node:nth-child(3) .node-card:hover { border-color:var(--yellow);box-shadow:0 20px 60px rgba(255,225,53,0.1); }
  .mindmap-node:nth-child(4) .node-card:hover { border-color:var(--purple);box-shadow:0 20px 60px rgba(168,85,247,0.1); }
  .mindmap-node:nth-child(5) .node-card:hover { border-color:var(--orange);box-shadow:0 20px 60px rgba(255,107,53,0.1); }
  .mindmap-node:nth-child(6) .node-card:hover { border-color:var(--blue);box-shadow:0 20px 60px rgba(59,130,246,0.1); }
  .node-icon { font-size:28px;margin-bottom:12px;display:block; }
  .node-title { font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:10px; }
  .node-badge { font-size:10px;padding:3px 10px;border-radius:100px;letter-spacing:2px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:500; }
  .tag-group { display:flex;flex-wrap:wrap;gap:8px;margin-top:12px; }
  .tag { font-size:12px;padding:5px 14px;border-radius:100px;font-weight:500; }
  .tag-cyan { background:rgba(0,245,212,0.1);color:var(--cyan);border:1px solid rgba(0,245,212,0.25); }
  .tag-pink { background:rgba(255,45,120,0.1);color:var(--pink);border:1px solid rgba(255,45,120,0.25); }
  .tag-yellow { background:rgba(255,225,53,0.1);color:var(--yellow);border:1px solid rgba(255,225,53,0.25); }
  .tag-purple { background:rgba(168,85,247,0.1);color:var(--purple);border:1px solid rgba(168,85,247,0.25); }
  .tag-orange { background:rgba(255,107,53,0.1);color:var(--orange);border:1px solid rgba(255,107,53,0.25); }
  .tag-blue { background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.25); }
  .intern-list { display:flex;flex-direction:column;gap:12px;margin-top:4px; }
  .intern-item { background:rgba(255,255,255,0.03);border-radius:12px;padding:14px 18px;border-left:3px solid;transition:background 0.2s; }
  .intern-item:hover { background:rgba(255,255,255,0.06); }
  .intern-item:nth-child(1) { border-color:var(--cyan); }
  .intern-item:nth-child(2) { border-color:var(--pink); }
  .intern-item:nth-child(3) { border-color:var(--yellow); }
  .intern-item:nth-child(4) { border-color:var(--purple); }
  .intern-company { font-family:'Syne',sans-serif;font-weight:700;font-size:14px; }
  .intern-role { font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px; }
  .intern-period { font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px; }
  .project-list { display:flex;flex-direction:column;gap:14px;margin-top:4px; }
  .project-item { background:rgba(255,255,255,0.03);border-radius:12px;padding:16px 18px;transition:background 0.2s,transform 0.2s; }
  .project-item:hover { background:rgba(255,255,255,0.06);transform:translateX(4px); }
  .project-name { font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;margin-bottom:6px; }
  .project-desc { font-size:12px;color:rgba(255,255,255,0.45);line-height:1.6; }
  .skill-group { display:flex;flex-direction:column;gap:14px;margin-top:4px; }
  .skill-header { display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px; }
  .skill-name { font-weight:500; }
  .skill-pct { color:rgba(255,255,255,0.4);font-size:12px; }
  .skill-bar-bg { height:5px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden; }
  .skill-bar { height:100%;border-radius:100px;width:0;transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .cert-list { display:flex;flex-direction:column;gap:10px;margin-top:4px; }
  .cert-item { display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border-radius:12px;padding:12px 16px;transition:background 0.2s; }
  .cert-item:hover { background:rgba(255,255,255,0.06); }
  .cert-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
  .cert-text { font-size:13px;color:rgba(255,255,255,0.7); }
  .edu-list { display:flex;flex-direction:column;gap:14px; }
  .edu-item { background:rgba(255,255,255,0.03);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden; }
  .edu-degree { font-family:'Syne',sans-serif;font-weight:700;font-size:14px; }
  .edu-school { font-size:12px;color:rgba(255,255,255,0.45);margin-top:4px; }
  .edu-year { font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px; }
  .edu-cgpa { position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Syne',sans-serif;font-weight:800;font-size:22px;opacity:0.12; }
  #contact { text-align:center;padding:80px 20px 120px; }
  .contact-links { display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:40px; }
  .contact-btn { display:flex;align-items:center;gap:10px;padding:14px 28px;border-radius:100px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;border:1px solid; }
  .contact-btn:hover { transform:translateY(-3px); }
  .btn-cyan { color:var(--cyan);border-color:var(--cyan);background:rgba(0,245,212,0.05); }
  .btn-cyan:hover { box-shadow:0 10px 30px rgba(0,245,212,0.2); }
  .btn-pink { color:var(--pink);border-color:var(--pink);background:rgba(255,45,120,0.05); }
  .btn-pink:hover { box-shadow:0 10px 30px rgba(255,45,120,0.2); }
  .btn-purple { color:var(--purple);border-color:var(--purple);background:rgba(168,85,247,0.05); }
  .btn-purple:hover { box-shadow:0 10px 30px rgba(168,85,247,0.2); }
  footer { text-align:center;padding:30px;color:rgba(255,255,255,0.15);font-size:12px;border-top:1px solid var(--line); }

  @media(max-width:600px) {
    .mindmap-spine { display:none; }
    .mindmap-node,.mindmap-node:nth-child(even) { flex-direction:column; }
    .node-connector { flex:0 0 30px;width:100%; }
    .av-wrap { width:180px;height:210px; }
    .speech-bubble { max-width:290px; }
  }

  /* ===== STRANGER THINGS RETRO CINEMATIC INTRO ===== */
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

  #intro-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: #000000 !important;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.2s ease, visibility 1.2s;
    overflow: hidden;
  }
  #intro-overlay::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.9) 100%),
                repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0.1) 1px, rgba(0,0,0,0) 2px);
    pointer-events: none; z-index: 2;
  }
  #intro-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .st-gate-container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; position: relative; z-index: 5; text-align: center; padding: 20px;
    transition: transform 0.5s ease;
  }
  .st-gate-container:hover { transform: scale(1.02); }

  .st-title-top {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; letter-spacing: 14px; color: #ff001e;
    text-transform: uppercase; margin-bottom: -10px; opacity: 0.8;
    text-shadow: 0 0 10px rgba(255, 0, 30, 0.6);
  }

  .st-title-main {
    font-family: 'Oswald', 'Arial Black', sans-serif;
    font-size: 85px; font-weight: 900; text-transform: uppercase;
    letter-spacing: -2px; line-height: 0.9; color: transparent;
    -webkit-text-stroke: 2px #ff001e;
    filter: drop-shadow(0 0 15px rgba(255, 0, 30, 0.85));
    position: relative; margin: 15px 0;
    animation: stGlowPulse 4s ease-in-out infinite alternate;
  }

  .st-bars {
    width: 280px; height: 4px; background: #ff001e;
    box-shadow: 0 0 12px #ff001e; margin: 10px auto; position: relative;
  }
  .st-bars::before, .st-bars::after {
    content: ''; position: absolute; width: 4px; height: 25px; background: #ff001e;
    box-shadow: 0 0 12px #ff001e; top: -10px;
  }
  .st-bars::before { left: 0; }
  .st-bars::after { right: 0; }

  .st-btn-action {
    margin-top: 40px; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 6px;
    color: #ffffff; text-transform: uppercase;
    background: rgba(255, 0, 30, 0.1); border: 1px solid #ff001e;
    padding: 14px 36px; border-radius: 4px;
    box-shadow: 0 0 15px rgba(255, 0, 30, 0.2);
    animation: stPulseBtn 2s infinite;
  }

  @keyframes stGlowPulse {
    0% { filter: drop-shadow(0 0 10px rgba(255, 0, 30, 0.7)); }
    100% { filter: drop-shadow(0 0 25px rgba(255, 0, 30, 1)); }
  }
  @keyframes stPulseBtn {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.03); opacity: 1; }
  }

  .intro-scene { display: none !important; }
  #intro-overlay.active-talking .intro-scene { display: flex !important; }
  #intro-overlay.active-talking .st-gate-container { display: none !important; }

  .avatar-skip-btn {
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.6); padding: 6px 14px; font-size: 11px;
    font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 2px;
    border-radius: 20px; cursor: pointer; margin-bottom: 25px; text-transform: uppercase;
    transition: all 0.3s ease;
  }
  .avatar-skip-btn:hover { background: #ff001e; color: #fff; border-color: #ff001e; }

</style>
