<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aravindh A — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5d4;
    --pink: #ff2d78;
    --yellow: #ffe135;
    --purple: #a855f7;
    --orange: #ff6b35;
    --blue: #3b82f6;
    --bg: #080810;
    --card: #0f0f1a;
    --line: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:#fff; font-family:'DM Sans',sans-serif; overflow-x:hidden; cursor:none; }

  /* ===== STRANGER THINGS RETRO CINEMATIC INTRO ===== */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: #000000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
    overflow: hidden;
  }
  #intro-overlay::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.9) 100%),
                repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0.1) 1px, rgba(0,0,0,0) 2px);
    pointer-events: none; z-index: 2;
  }
  #intro-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .st-gate-container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; position: relative; z-index: 5; text-align: center; padding: 20px;
    transition: transform 0.5s ease;
  }
  .st-gate-container:hover { transform: scale(1.02); }

  .st-title-top {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; letter-spacing: 14px; color: #ff001e;
    text-transform: uppercase; margin-bottom: -10px; opacity: 0.8;
    text-shadow: 0 0 10px rgba(255, 0, 30, 0.6);
  }

  .st-title-main {
    font-family: 'Oswald', 'Arial Black', sans-serif;
    font-size: 85px; font-weight: 900; text-transform: uppercase;
    letter-spacing: -2px; line-height: 0.9; color: transparent;
    -webkit-text-stroke: 2px #ff001e;
    filter: drop-shadow(0 0 15px rgba(255, 0, 30, 0.85));
    position: relative; margin: 15px 0;
    animation: stGlowPulse 4s ease-in-out infinite alternate;
  }

  .st-bars {
    width: 280px; height: 4px; background: #ff001e;
    box-shadow: 0 0 12px #ff001e; margin: 10px auto; position: relative;
  }
  .st-bars::before, .st-bars::after {
    content: ''; position: absolute; width: 4px; height: 25px; background: #ff001e;
    box-shadow: 0 0 12px #ff001e; top: -10px;
  }
  .st-bars::before { left: 0; }
  .st-bars::after { right: 0; }

  .st-btn-action {
    margin-top: 40px; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 6px;
    color: #ffffff; text-transform: uppercase;
    background: rgba(255, 0, 30, 0.1); border: 1px solid #ff001e;
    padding: 14px 36px; border-radius: 4px;
    box-shadow: 0 0 15px rgba(255, 0, 30, 0.2);
    animation: stPulseBtn 2s infinite;
  }

  @keyframes stGlowPulse {
    0% { filter: drop-shadow(0 0 10px rgba(255, 0, 30, 0.7)); }
    100% { filter: drop-shadow(0 0 25px rgba(255, 0, 30, 1)); }
  }
  @keyframes stPulseBtn {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.03); opacity: 1; }
  }

  /* Intro Screen Presentation Controls */
  .intro-scene { display: none; flex-direction: column; align-items: center; position: relative; }
  #intro-overlay.active-talking .intro-scene { display: flex; }
  #intro-overlay.active-talking .st-gate-container { display: none; }

  .avatar-skip-btn {
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.6); padding: 6px 14px; font-size: 11px;
    font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 2px;
    border-radius: 20px; cursor: pointer; margin-bottom: 15px; text-transform: uppercase;
  }
  .avatar-skip-btn:hover { background: #ff001e; color: #fff; border-color: #ff001e; }

  .av-wrap { position: relative; width: 220px; height: 260px; }
  .av-glow-inner { position: absolute; inset: 0; border-radius: 50%; background: #222; overflow: hidden; border: 2px solid var(--cyan); }
  .av-img { width: 100%; height: 100%; object-fit: cover; }

  .speech-bubble {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(0,245,212,0.3);
    border-radius: 15px; padding: 20px; max-width: 380px; margin-top: 20px; text-align: center;
  }
  #speech-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; color: #fff; }
  .cursor-blink { display: inline-block; width: 2px; height: 16px; background: var(--cyan); margin-left: 2px; }

  /* ===== MAIN PORTFOLIO SIMULATOR WORKSPACE ===== */
  #main-portfolio { display: none; opacity: 0; transition: opacity 1s; padding: 40px; text-align: center; font-family: 'Syne', sans-serif; }
  #main-portfolio.visible { display: block; opacity: 1; }
  .dashboard-title { font-size: 40px; margin-top: 100px; color: var(--cyan); text-transform: uppercase; letter-spacing: 4px; }
</style>
</head>
<body>

<div id="intro-overlay">
  <div class="st-gate-container" onclick="activateCinematicIntro()">
    <div class="st-title-top">ENTER THE MATRIX</div>
    <div class="st-bars"></div>
    <div class="st-title-main">ARAVINDH</div>
    <div class="st-btn-action">ENTER PORTFOLIO</div>
  </div>

  <div class="intro-scene">
    <button class="avatar-skip-btn" onclick="skipIntro()">Skip Intro ✕</button>
    <div class="av-wrap">
      <div class="av-glow-inner">
        <img id="avImg" class="av-img" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=300&q=80" alt="Avatar">
      </div>
    </div>

    <div class="speech-bubble">
      <div id="speech-text"><span class="cursor-blink"></span></div>
    </div>
  </div>
</div>

<div id="main-portfolio">
  <h1 class="dashboard-title">Welcome to my Digital Hub</h1>
  <p style="color: #aaa; margin-top: 20px;">Your full skills architecture, projects network, and experience tracking render smoothly here.</p>
</div>

<script>
const lines = [
  { text: "Hey there. Welcome to my space.", pause: 600 },
  { text: "I am Aravindh, a third year computer science and artificial intelligence student from Chennai.", pause: 400 },
  { text: "I have done four internships in artificial intelligence, web development, and prompt engineering.", pause: 400 },
  { text: "Python, Java, Django, that is my stack.", pause: 400 },
  { text: "I build real things. Let me show you what I have built.", pause: 0 },
];

const speechText = document.getElementById('speech-text');
const avImg = document.getElementById('avImg');
let synth = window.speechSynthesis;
let charIndex = 0;
let currentText = '';
let typeInterval = null;

let bgm = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
bgm.loop = true;

function activateCinematicIntro() {
  if(synth) { synth.cancel(); }
  bgm.volume = 0.15; 
  bgm.play().catch(e => console.log("BGM audio initialization error:", e));

  document.getElementById('intro-overlay').classList.add('active-talking');
  startLines();
}

function startLines() {
  let idx = 0;
  function next() {
    if(idx >= lines.length) {
      setTimeout(enterPortfolio, 800);
      return;
    }
    typeLine(idx, () => { idx++; next(); });
  }
  next();
}

function typeLine(lineIdx, cb) {
  const line = lines[lineIdx];
  currentText = '';
  charIndex = 0;
  speechText.innerHTML = '<span class="cursor-blink"></span>';

  let textFinishedTyping = false;
  let speechFinishedSpeaking = false;

  function checkAndProceed() {
    if (textFinishedTyping && speechFinishedSpeaking) {
      setTimeout(cb, line.pause + 400);
    }
  }

  if(synth) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(line.text);
    const voices = synth.getVoices();
    
    // Strict masculine baritone filter setup
    const premiumDeepMale = voices.filter(v => /david|microsoft david|google us english|male|man|guy|george|mark|alex/i.test(v.name) && !/female|woman|girl|lady|zira|samantha/i.test(v.name));
    const targetVoice = premiumDeepMale.find(v => /david|microsoft/i.test(v.name)) || 
                        premiumDeepMale.find(v => /google/i.test(v.name)) || 
                        voices.find(v => v.lang.startsWith('en-') && /male/i.test(v.name)) || voices[0];
                        
    if(targetVoice) utt.voice = targetVoice;
    
    utt.rate = 0.84;  // Slower, powerful cadence
    utt.pitch = 0.52; // Maximum bass floor rumble
    utt.volume = 1.0;

    utt.onend = () => { speechFinishedSpeaking = true; checkAndProceed(); };
    utt.onerror = () => { speechFinishedSpeaking = true; checkAndProceed(); };
    synth.speak(utt);
  } else {
    speechFinishedSpeaking = true;
  }

  typeInterval = setInterval(() => {
    charIndex++;
    currentText = line.text.slice(0, charIndex);
    speechText.innerHTML = currentText + '<span class="cursor-blink"></span>';
    if(charIndex >= line.text.length) {
      clearInterval(typeInterval);
      textFinishedTyping = true;
      checkAndProceed();
    }
  }, 38);
}

function enterPortfolio() {
  if(synth) synth.cancel();
  document.getElementById('intro-overlay').classList.add('hidden');
  document.getElementById('main-portfolio').classList.add('visible');
}

function skipIntro() {
  clearInterval(typeInterval);
  enterPortfolio();
}
</script>
</body>
</html>
